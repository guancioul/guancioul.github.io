{{ $username := .Get "username" | default "guancioul" }}

<div class="gh-pr-list" id="gh-pr-list" data-username="{{ $username }}">
  <div class="gh-pr-loading">
    <span class="gh-spinner"></span> Loading pull requests...
  </div>
</div>

<script>
(function () {
  const container = document.getElementById('gh-pr-list');
  const username = container.dataset.username;
  const apiUrl = `https://api.github.com/search/issues?q=author:${username}+type:pr+is:public&per_page=100&sort=updated&order=desc`;

  function timeAgo(dateStr) {
    const diff = (Date.now() - new Date(dateStr)) / 1000;
    if (diff < 60) return `${Math.floor(diff)} seconds ago`;
    if (diff < 3600) return `${Math.floor(diff / 60)} minutes ago`;
    if (diff < 86400) return `${Math.floor(diff / 3600)} hours ago`;
    if (diff < 2592000) return `${Math.floor(diff / 86400)} days ago`;
    if (diff < 31536000) return `${Math.floor(diff / 2592000)} months ago`;
    return `${Math.floor(diff / 31536000)} years ago`;
  }

  function statusIcon(item) {
    if (item.pull_request && item.pull_request.merged_at) {
      return `<svg class="gh-pr-icon gh-pr-icon--merged" viewBox="0 0 16 16"><path d="M5.45 5.154A4.25 4.25 0 0 0 9.25 7.5h1.378a2.251 2.251 0 1 1 0 1.5H9.25A5.734 5.734 0 0 1 5 6.823v3.42a2.251 2.251 0 1 1-1.5 0V4.845a2.25 2.25 0 1 1 1.95.309ZM4.25 13.5a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Zm8.5-4.5a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5ZM5 3.25a.75.75 0 1 0 0 .005V3.25Z"/></svg>`;
    } else if (item.state === 'open') {
      return `<svg class="gh-pr-icon gh-pr-icon--open" viewBox="0 0 16 16"><path d="M1.5 3.25a2.25 2.25 0 1 1 3 2.122v5.256a2.251 2.251 0 1 1-1.5 0V5.372A2.25 2.25 0 0 1 1.5 3.25Zm5.677-.177L9.573.677A.25.25 0 0 1 10 .854V2.5h1A2.5 2.5 0 0 1 13.5 5v5.628a2.251 2.251 0 1 1-1.5 0V5a1 1 0 0 0-1-1h-1v1.646a.25.25 0 0 1-.427.177L7.177 3.427a.25.25 0 0 1 0-.354ZM3.75 2.5a.75.75 0 1 0 0 1.5.75.75 0 0 0 0-1.5Zm0 9.5a.75.75 0 1 0 0 1.5.75.75 0 0 0 0-1.5Zm8.25.75a.75.75 0 1 0 1.5 0 .75.75 0 0 0-1.5 0Z"/></svg>`;
    } else {
      return `<svg class="gh-pr-icon gh-pr-icon--closed" viewBox="0 0 16 16"><path d="M3.25 1A2.25 2.25 0 0 1 4 5.372v5.256a2.251 2.251 0 1 1-1.5 0V5.372A2.251 2.251 0 0 1 3.25 1Zm9.5 14a2.25 2.25 0 1 1 0-4.5 2.25 2.25 0 0 1 0 4.5ZM2.5 3.25a.75.75 0 1 0 1.5 0 .75.75 0 0 0-1.5 0ZM3.25 12a.75.75 0 1 0 0 1.5.75.75 0 0 0 0-1.5Zm9.5 0a.75.75 0 1 0 0 1.5.75.75 0 0 0 0-1.5Zm-3-8.75a.25.25 0 0 1 .427-.177l2.396 2.396a.25.25 0 0 1 0 .354l-2.396 2.396A.25.25 0 0 1 9.75 7.97V6.5H9A3.5 3.5 0 0 0 5.5 10v.628a2.25 2.25 0 1 1-1.5 0V10a5 5 0 0 1 5-5h.75V3.25Z"/></svg>`;
    }
  }

  function repoFromUrl(url) {
    // e.g. https://api.github.com/repos/owner/repo/issues/1
    const match = url.match(/repos\/([^/]+\/[^/]+)\//);
    return match ? match[1] : '';
  }

  function renderPRs(items) {
    if (!items.length) {
      container.innerHTML = '<p class="gh-pr-empty">No public pull requests found.</p>';
      return;
    }

    const openCount = items.filter(i => i.state === 'open').length;
    const closedCount = items.filter(i => i.state !== 'open').length;

    const cards = items.map(item => {
      const repo = repoFromUrl(item.repository_url);
      const isMerged = item.pull_request && item.pull_request.merged_at;
      const statusLabel = isMerged ? 'Merged' : (item.state === 'open' ? 'Open' : 'Closed');

      return `
      <div class="gh-pr-item">
        <div class="gh-pr-left">
          ${statusIcon(item)}
          <div class="gh-pr-info">
            <div class="gh-pr-title">
              <span class="gh-pr-repo">${repo}</span>
              <a class="gh-pr-link" href="${item.html_url}" target="_blank" rel="noopener">${item.title}</a>
            </div>
            <div class="gh-pr-meta">
              #${item.number} &bull; ${statusLabel} ${timeAgo(isMerged ? item.pull_request.merged_at : item.created_at)} by ${item.user.login}
            </div>
          </div>
        </div>
        <div class="gh-pr-right">
          ${item.comments ? `<span class="gh-pr-stat" title="Comments">
            <svg viewBox="0 0 16 16" width="14" height="14"><path d="M1 2.75C1 1.784 1.784 1 2.75 1h10.5c.966 0 1.75.784 1.75 1.75v7.5A1.75 1.75 0 0 1 13.25 12H9.06l-2.573 2.573A1.457 1.457 0 0 1 4 13.543V12H2.75A1.75 1.75 0 0 1 1 10.25Zm1.75-.25a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h2a.75.75 0 0 1 .75.75v2.189l2.72-2.719a.75.75 0 0 1 .53-.22h4.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z"/></svg>
            ${item.comments}
          </span>` : ''}
        </div>
      </div>`;
    }).join('');

    container.innerHTML = `
      <div class="gh-pr-header">
        <span class="gh-pr-count gh-pr-count--open">
          <svg class="gh-pr-icon gh-pr-icon--open gh-pr-icon--sm" viewBox="0 0 16 16"><path d="M1.5 3.25a2.25 2.25 0 1 1 3 2.122v5.256a2.251 2.251 0 1 1-1.5 0V5.372A2.25 2.25 0 0 1 1.5 3.25Zm5.677-.177L9.573.677A.25.25 0 0 1 10 .854V2.5h1A2.5 2.5 0 0 1 13.5 5v5.628a2.251 2.251 0 1 1-1.5 0V5a1 1 0 0 0-1-1h-1v1.646a.25.25 0 0 1-.427.177L7.177 3.427a.25.25 0 0 1 0-.354ZM3.75 2.5a.75.75 0 1 0 0 1.5.75.75 0 0 0 0-1.5Zm0 9.5a.75.75 0 1 0 0 1.5.75.75 0 0 0 0-1.5Zm8.25.75a.75.75 0 1 0 1.5 0 .75.75 0 0 0-1.5 0Z"/></svg>
          ${openCount} Open
        </span>
        <span class="gh-pr-count gh-pr-count--closed">
          <svg viewBox="0 0 16 16" width="14" height="14"><path d="M13.78 4.22a.75.75 0 0 1 0 1.06l-7.25 7.25a.75.75 0 0 1-1.06 0L2.22 9.28a.751.751 0 0 1 .018-1.042.751.751 0 0 1 1.042-.018L6 10.94l6.72-6.72a.75.75 0 0 1 1.06 0Z"/></svg>
          ${closedCount} Closed
        </span>
      </div>
      <div class="gh-pr-items">${cards}</div>`;
  }

  fetch(apiUrl, { headers: { Accept: 'application/vnd.github.v3+json' } })
    .then(r => r.json())
    .then(data => renderPRs(data.items || []))
    .catch(() => {
      container.innerHTML = '<p class="gh-pr-empty">Failed to load pull requests. GitHub API rate limit may have been exceeded.</p>';
    });
})();
</script>
