{{ $username := .Get "username" | default "guancioul" }}

{{ partial "pr-icons.html" . }}

<div class="gh-pr-list" id="gh-pr-list" data-username="{{ $username }}">
  <div class="gh-pr-loading">
    <span class="gh-spinner"></span> Loading pull requests...
  </div>
</div>

<script>
(function () {
  const container = document.getElementById('gh-pr-list');
  const username = container.dataset.username;

  const PER_PAGE = 5;
  let currentPage = 1;
  let totalCount = 0;

  function apiUrl(page) {
    return `https://api.github.com/search/issues?q=author:${username}+type:pr+is:public+-user:${username}&per_page=${PER_PAGE}&page=${page}&sort=updated&order=desc`;
  }

  function timeAgo(dateStr) {
    const diff = (Date.now() - new Date(dateStr)) / 1000;
    if (diff < 60) return `${Math.floor(diff)} seconds ago`;
    if (diff < 3600) return `${Math.floor(diff / 60)} minutes ago`;
    if (diff < 86400) return `${Math.floor(diff / 3600)} hours ago`;
    if (diff < 2592000) return `${Math.floor(diff / 86400)} days ago`;
    if (diff < 31536000) return `${Math.floor(diff / 2592000)} months ago`;
    return `${Math.floor(diff / 31536000)} years ago`;
  }

  function icon(id, cls) {
    return `<svg class="${cls}" aria-hidden="true"><use href="#${id}"></use></svg>`;
  }

  function statusIcon(item) {
    if (item.pull_request && item.pull_request.merged_at)
      return icon('icon-pr-merged', 'gh-pr-icon gh-pr-icon--merged');
    if (item.draft)
      return icon('icon-pr-draft', 'gh-pr-icon gh-pr-icon--draft');
    if (item.state === 'open')
      return icon('icon-pr-open', 'gh-pr-icon gh-pr-icon--open');
    return icon('icon-pr-closed', 'gh-pr-icon gh-pr-icon--closed');
  }

  function repoFromUrl(url) {
    const match = url.match(/repos\/([^/]+\/[^/]+)\//);
    return match ? match[1] : '';
  }

  function renderPagination() {
    const totalPages = Math.ceil(Math.min(totalCount, 1000) / PER_PAGE);
    if (totalPages <= 1) return '';

    const pages = [];

    // Always show first page
    pages.push(1);

    // Show ellipsis and surrounding pages
    if (currentPage > 3) pages.push('...');
    for (let p = Math.max(2, currentPage - 1); p <= Math.min(totalPages - 1, currentPage + 1); p++) {
      pages.push(p);
    }
    if (currentPage < totalPages - 2) pages.push('...');

    // Always show last page
    if (totalPages > 1) pages.push(totalPages);

    const pageButtons = pages.map(p => {
      if (p === '...') return `<span class="gh-pagination-ellipsis">…</span>`;
      const active = p === currentPage ? ' gh-pagination-btn--active' : '';
      return `<button class="gh-pagination-btn${active}" data-page="${p}" ${p === currentPage ? 'aria-current="page"' : ''}>${p}</button>`;
    }).join('');

    const prevDisabled = currentPage === 1 ? ' disabled' : '';
    const nextDisabled = currentPage === totalPages ? ' disabled' : '';

    return `
      <div class="gh-pagination">
        <button class="gh-pagination-btn gh-pagination-btn--nav" data-page="${currentPage - 1}"${prevDisabled} aria-label="Previous page">&#8592;</button>
        ${pageButtons}
        <button class="gh-pagination-btn gh-pagination-btn--nav" data-page="${currentPage + 1}"${nextDisabled} aria-label="Next page">&#8594;</button>
      </div>`;
  }

  function renderPRs(data) {
    const items = data.items || [];
    totalCount = data.total_count || 0;

    if (!items.length) {
      container.innerHTML = '<p class="gh-pr-empty">No open source pull requests found.</p>';
      return;
    }

    const openCount = items.filter(i => i.state === 'open').length;
    const closedCount = items.filter(i => i.state !== 'open').length;

    const cards = items.map(item => {
      const repo = repoFromUrl(item.repository_url);
      const isMerged = item.pull_request && item.pull_request.merged_at;
      const statusLabel = isMerged ? 'Merged' : (item.draft ? 'Draft' : (item.state === 'open' ? 'Open' : 'Closed'));
      const association = item.author_association;
      const showBadge = association && association !== 'NONE';
      const badgeLabel = association ? association.charAt(0) + association.slice(1).toLowerCase() : '';
      const associationBadge = showBadge ? `<span class="gh-pr-association">${badgeLabel}</span>` : '';

      return `
      <div class="gh-pr-item">
        <div class="gh-pr-left">
          ${statusIcon(item)}
          <div class="gh-pr-info">
            <div class="gh-pr-title">
              <span class="gh-pr-repo">${repo}</span>
              <a class="gh-pr-link" href="${item.html_url}" target="_blank" rel="noopener">${item.title}</a>
            </div>
            <div class="gh-pr-meta">
              #${item.number} by ${item.user.login} ${associationBadge} ${statusLabel} ${timeAgo(isMerged ? item.pull_request.merged_at : item.created_at)}
            </div>
          </div>
        </div>
      </div>`;
    }).join('');

    const totalPages = Math.ceil(Math.min(totalCount, 1000) / PER_PAGE);
    const start = (currentPage - 1) * PER_PAGE + 1;
    const end = Math.min(currentPage * PER_PAGE, totalCount);

    container.innerHTML = `
      <div class="gh-pr-header">
        <span class="gh-pr-count gh-pr-count--open">
          ${icon('icon-pr-open', 'gh-pr-icon gh-pr-icon--open gh-pr-icon--sm')}
          ${openCount} Open
        </span>
        <span class="gh-pr-count gh-pr-count--closed">
          ${closedCount} Closed
        </span>
        <span class="gh-pr-page-info">
          ${start}–${end} of ${totalCount}
        </span>
      </div>
      <div class="gh-pr-items">${cards}</div>
      ${renderPagination()}`;

    // Attach pagination click handlers
    container.querySelectorAll('.gh-pagination-btn[data-page]').forEach(btn => {
      btn.addEventListener('click', () => {
        const page = parseInt(btn.dataset.page, 10);
        if (!isNaN(page) && page !== currentPage) {
          currentPage = page;
          loadPage();
        }
      });
    });
  }

  function loadPage() {
    container.innerHTML = `
      <div class="gh-pr-loading">
        <span class="gh-spinner"></span> Loading pull requests...
      </div>`;

    fetch(apiUrl(currentPage), { headers: { Accept: 'application/vnd.github.v3+json' } })
      .then(r => r.json())
      .then(data => renderPRs(data))
      .catch(() => {
        container.innerHTML = '<p class="gh-pr-empty">Failed to load pull requests. GitHub API rate limit may have been exceeded.</p>';
      });
  }

  loadPage();
})();
</script>
