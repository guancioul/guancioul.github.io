- repo: strimzi/strimzi-kafka-operator
  title: "Reconcile Cruise Control before Entity Operator"
  description: "Fixed race condition where Topic Operator CC API secret might not exist when CruiseControlReconciler tried to read it; reordered reconciliation so Cruise Control runs before Entity Operator and generates the secret first"
  issue_url: https://github.com/strimzi/strimzi-kafka-operator/pull/12759
