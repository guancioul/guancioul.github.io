      number: 12631

- repo: strimzi/strimzi-kafka-operator
  title: "Connector State Transition Fix (FAILED → STOPPED/PAUSED)"
  description: "Fixed silent failure when transitioning connectors from FAILED state; FAILED→PAUSED now surfaces a condition warning instead of calling the pause API which returns 202 but silently fails in Kafka Connect"
  issue_url: https://github.com/strimzi/strimzi-kafka-operator/pull/12750
  prs:
    - repo: strimzi/strimzi-kafka-operator
      url: https://github.com/strimzi/strimzi-kafka-operator/pull/12750
      number: 12750

