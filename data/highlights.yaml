- repo: strimzi/strimzi-kafka-operator
  title: "On-demand KafkaUser Certificate Renewal"
  description: "Implemented via strimzi.io/force-renew annotation, enabling zero-disruption cert rotation; previous cert remains valid until natural expiry; documented in official Strimzi docs"
  issue_url: https://github.com/strimzi/strimzi-kafka-operator/issues/12337
  prs:
    - repo: strimzi/strimzi-kafka-operator
