# Build check – runs on every push and pull request
name: Build check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Lint and build
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: 24.14.0
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Lint markdown
        run: npm run lint:md

      - name: Build
        run: npm run build
